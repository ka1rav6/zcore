name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Zig
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.17.0-dev.1158+1d1193aa7"

      # Format check
      - name: Check formatting
        run: zig fmt --check .

      # Run tests
      - name: Run test script
        run: bash ./run_tests.sh

      # Build project
      - name: Build
        run: zig build

      # Success message
      - name: Done
        run: echo "Completed GitHub Actions successfully."
